<!doctype html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
     <script src="youtube.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <!-- Add this line to the <head> of your index.html file -->
    <script src="cdn.jsdelivr.net"></script>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>nostalgiaTok</title>
    <meta name="description" content="Watch old TikToks like you're there again" />

    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Project stylesheet -->
    <link rel="stylesheet" href="style.css" />

    <script src="script.js"></script>
    <!-- Theme color for address bar -->
    <meta name="theme-color" content="#77867f" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="logo.png" />
</head>
<body>
    <div id="titleBar"><div><img src="logo.png" id="logo"><span words="1">nostalgiaTok</span> <span words="0"></span> <span words="2" href="">peiLamed</span></div></div>
    <div id="pgTitle" style=""><button class="primaryButton" onclick="pgCancel(this.innerText)">X</button><b>Search History</b></div>
    <div id="playground" class="scrollable">

        <div class="pgMain" dir="right">
            <div class="pgP">
                <p class="pgFlex"><span>year:</span><span class="pgData"></span></p>
                <p class="pgFlex">
                    <span>creator(s):</span><span class="pgData"></span>
                </p>
                <p class="pgFlex">
                    <span>topic(s):</span><span class="pgData"></span>
                </p>
                <div class="pgButtonHold">
                    <button class="notspecial pgButton" style="display:none" onclick="eMA2(false, this)">search this now</button><button class="notspecial primaryButton" onclick="eMA2(true, this)">search again!</button><button id="pgSN" class="notspecial pgButton" onclick="eMA2(true, this, true)">search new</button>
                </div>
            </div>
            <div class="pgCover">

            </div>
        </div>
    </div>
    <div id="allHold">
        <div id="textEnter" class="teTextEnter card">
            <b id="teTitle" words="3"></b>
            <input n="0" type="text" class="hasBorder" id="teInput" />
            <button id="teButton" words="4" onclick='  if (doneAnimation) {            var thisVall = validateDate(document.querySelector("#teInput").value);            if (!thisVall.includes("Year Error")) {                user.year = thisVall;                makeShapes(user.year, "", "y", true);                swapTe(8, generatePreferences, 4, generatePreferences);                document.querySelector("#teButton").removeAttribute("onclick", "");            } else {                handleError(thisVall)            }        }'></button>
            <button id="viewSaved"></button>
            <button id="saveThis"></button>
        </div>
        <div id="uvula" style="transform: rotateZ(0deg)">
            <div id="uBalance"></div>
            <div id="uLine"></div>
            <div id="uMiniball"></div>
            <div class="uBall"></div>
            <div id="uNameplate"></div>
        </div>
        <div id="displayVideos">
            <iframe id="videoFrame" src="" frameborder="0" allow="autoplay">
            </iframe>
            <div id="buttonHolder">
                <div id="leftButton" class="sideButton" words="25"></div>
            </div>
        </div>
        <div id="background"></div>
        <div class="scrollable" id="swipeScreen" ontouchend="endFollow()" onmouseup="endFollow()">
            <div class="scrollable" id="swFirst">
                <p class="swText scrollable"></p>
                <div class="scrollable" id="swDrag" words="30" onmousedown="startFollow()" ontouchstart="startFollow()" ontouchend="endFollow()" onmouseup="endFollow()"></div>
            </div>
            <div class="scrollable" id="swLine"></div>
            <div class="scrollable " id="creator">
                <p class="swText scrollable" words="28"></p>
                <div class="swGive scrollable"></div>
            </div>
            <div class="scrollable" id="swTopic">
                <p class="swText scrollable" words="29"></p>
                <div class="swGive scrollable"></div>
            </div>
            <div class="scrollable" id="exitsw">
                <p class="swText scrollable" words="30"></p>
                <div class="swGive scrollable"></div>
            </div>
            <div class="scrollable" id="sharenos">
                <p class="swText scrollable" words="31"></p>
                <div class="swGive scrollable"></div>
            </div>
        </div>
        <div id="touchOverlay" onclick = "autoplay = 0; playPause +=1; if (playPause % 2 == 0) {player.pauseVideo()} else {player.playVideo()}">
            <div id="fullscreenButton" onclick="requestTheFullscreen(true)">↘</div>
        </div>
    </div>
</body>
</html>
